html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}

input:focus,select:focus{outline:none;border-color:var(--cy)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Layout */
.app{display:flex;flex-direction:column;height:100dvh}
.topbar{padding:8px 14px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:var(--s1);flex-shrink:0;min-height:44px}
.main{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px;-webkit-overflow-scrolling:touch;padding-bottom:calc(58px + env(safe-area-inset-bottom,0px))}

/* Nav — bottom on mobile */
.nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,20,.98);border-top:1px solid var(--bd);padding:4px 0 calc(4px + env(safe-area-inset-bottom,0px));z-index:100;justify-content:space-around;backdrop-filter:blur(12px)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 2px;cursor:pointer;color:var(--t3);font-size:9px;font-weight:600;flex:1;min-width:0;transition:color .2s}
.nav-btn.active{color:var(--cy)}

/* ═══ PC LAYOUT ═══ */
@media(min-width:900px){

@media(min-width:900px){

.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}

// ═══ CONSOLE F12 INTÉGRÉE ═══
var _logs=[];var _logMax=100;var _consoleOpen=false;
var _origLog=console.log,_origWarn=console.warn,_origErr=console.error;
function _addLog(type,args){
  var msg=Array.from(args).map(function(a){try{return typeof a==="object"?JSON.stringify(a).slice(0,200):String(a).slice(0,200);}catch(e){return String(a);}}).join(" ");
  _logs.push({t:Date.now(),type:type,msg:msg});
  if(_logs.length>_logMax)_logs.shift();
  _updateConsole();
}
console.log=function(){_origLog.apply(console,arguments);_addLog("log",arguments);};
console.warn=function(){_origWarn.apply(console,arguments);_addLog("warn",arguments);};
console.error=function(){_origErr.apply(console,arguments);_addLog("error",arguments);};
window.addEventListener("error",function(e){_addLog("error",["❌ "+e.message+" (ligne "+e.lineno+")"]);});
window.addEventListener("unhandledrejection",function(e){var msg=e.reason?.message||String(e.reason||"");if(msg.includes("Clipboard")||msg.includes("permission"))return;_addLog("warn",["⚠️ "+msg.slice(0,100)]);});
function _updateConsole(){
  var el=document.getElementById("f12console");if(!el||!_consoleOpen)return;
  el.innerHTML=_logs.map(function(l){
    var col=l.type==="error"?"#f87171":l.type==="warn"?"#fbbf24":"#64748b";
    var icon=l.type==="error"?"❌":l.type==="warn"?"⚠️":"›";
    var time=new Date(l.t).toLocaleTimeString("fr");
    return '<div style="padding:3px 6px;border-bottom:1px solid #1e293b;color:'+col+';font-size:10px;word-break:break-all"><span style="color:#475569">'+time+'</span> '+icon+' '+l.msg.replace(/</g,"&lt;")+'</div>';
  }).join("");
  el.scrollTop=el.scrollHeight;
}
function toggleF12(){
  _consoleOpen=!_consoleOpen;
  var panel=document.getElementById("f12panel");
  if(panel)panel.style.display=_consoleOpen?"block":"none";
  if(_consoleOpen)_updateConsole();
}
function copyF12(){
  var txt=_logs.map(function(l){return new Date(l.t).toLocaleTimeString("fr")+" ["+l.type+"] "+l.msg;}).join("\n");
  try{
    var ta=document.createElement("textarea");ta.value=txt;ta.style.position="fixed";ta.style.left="-9999px";
    document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);
    alert("Copié! ("+_logs.length+" lignes)");
  }catch(e){prompt("Copie ce texte:",txt);}
}
function clearF12(){_logs=[];_updateConsole();}

let bestProxy=-1;let fetchFails=0;

async function cgFetch(url){
  // Try direct fetch first (works on hosted sites + some browsers)
  try{
    const r=await fetch(url,{signal:undefined});
    if(r.ok){fetchFails=0;return r;}
    if(r.status===429){fetchFails++;return r;} // Rate limited
  }catch(e){}
  // If direct fails, try CORS proxies
  for(let i=0;i<PROXIES.length;i++){
    const pi=bestProxy>=0?(bestProxy+i)%PROXIES.length:i;
    try{
      const r=await fetch(PROXIES[pi]+encodeURIComponent(url),{signal:undefined});
      if(r.ok){bestProxy=pi;fetchFails=0;return r;}
      if(r.status===429){fetchFails++;return r;}
    }catch(e){}
  }
  fetchFails++;
  return{ok:false,status:0,json:()=>Promise.resolve(null)};
}

// ═══ SÉCURITÉ SHIELD — Protection maximale ═══
const SHIELD={
  // AES-256-GCM encryption for wallet keys
  async getKey(){
    if(!window.crypto?.subtle)return null;
    const id=navigator.userAgent+screen.width+screen.height+(navigator.language||"");
    const raw=new TextEncoder().encode(id);
    const hash=await crypto.subtle.digest("SHA-256",raw);
    return crypto.subtle.importKey("raw",hash,{name:"AES-GCM"},false,["encrypt","decrypt"]);
  },
  async encrypt(text){
    try{
      const key=await this.getKey();if(!key)return btoa(text);
      const iv=crypto.getRandomValues(new Uint8Array(12));
      const enc=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(text));
      return JSON.stringify({iv:Array.from(iv),data:Array.from(new Uint8Array(enc))});
    }catch(e){return null;}
  },
  async decrypt(stored){
    try{
      if(!stored.startsWith('{'))return atob(stored);
      const{iv,data}=JSON.parse(stored);
      const key=await this.getKey();if(!key)return null;
      const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(iv)},key,new Uint8Array(data));
      return new TextDecoder().decode(dec);
    }catch(e){return null;}
  },
  // Sanitize all inputs — prevent XSS
  clean(s){return String(s||"").replace(/[<>"'&]/g,"").trim().slice(0,200);},
  // Mask sensitive data for display
  mask(s){if(!s||s.length<8)return"••••";return s.slice(0,4)+"••••••"+s.slice(-4);},
  // Session timeout — auto-lock after 30min inactivity
  lastActivity:Date.now(),
  checkTimeout(){
    if(WALLET.connected&&Date.now()-this.lastActivity>1800000){
      WALLET.connected=false;lg("SYS","🔒 Session expirée — wallet verrouillé (30min inactivité)");D();
    }
  },
  touch(){this.lastActivity=Date.now();}
};

// Record important market event
function memRecord(type,data){
  MEMORY.events.push({t:Date.now(),type:type,data:data});
  // Keep max 200 events
  if(MEMORY.events.length>200)MEMORY.events=MEMORY.events.slice(-200);
}
// Record a trading pattern (win or loss with conditions)
function memPattern(coin,result,conditions){
  MEMORY.patterns.push({t:Date.now(),coin:coin,win:result>0,pnl:result,cond:conditions});
  if(MEMORY.patterns.length>100)MEMORY.patterns=MEMORY.patterns.slice(-100);
}
// Get memory insights for a coin
function memInsights(coinId){
  var trades=MEMORY.patterns.filter(function(p){return p.coin===coinId;});
  if(!trades.length)return null;
  var wins=trades.filter(function(p){return p.win;}).length;
  var total=trades.length;
  var avgPnl=trades.reduce(function(s,p){return s+p.pnl;},0)/total;
  return{trades:total,winRate:Math.round(wins/total*100),avgPnl:avgPnl,
    lastTrade:trades[trades.length-1],
    recommendation:wins/total>=0.6?"✅ Historique positif":"⚠️ Historique mitigé"};
}

}

function importData(){
  var input=document.createElement("input");
  input.type="file";input.accept=".json";
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.version||!data.state){alert("❌ Fichier invalide");return;}
        if(!confirm("⚠️ Restaurer cette sauvegarde du "+data.date+"?\n\nCapital: "+data.state.cash+"€\nPositions: "+data.state.pos.length+"\nTrades: "+data.state.cl.length+"\n\nCela remplacera toutes les données actuelles."))return;
        // Restore
        S.cash=data.state.cash;S.pos=data.state.pos||[];S.cl=data.state.cl||[];
        S.eqH=data.state.eqH||[];S.log=data.state.log||[];S.mode=data.state.mode||"normal";
        S.autoGuardian=data.state.autoGuardian!==undefined?data.state.autoGuardian:true;
        if(data.brain){Object.keys(data.brain).forEach(function(k){B[k]=data.brain[k];});}
        if(data.memory){MEMORY.events=data.memory.events||[];MEMORY.patterns=data.memory.patterns||[];}
        if(data.config)CFG=data.config;
        save();D();
        alert("✅ Données restaurées ! Capital: "+S.cash+"€ • "+S.pos.length+" position(s) • "+S.cl.length+" trade(s)");
      }catch(err){alert("❌ Erreur import: "+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

    });
    const data=await r.json();
    if(!r.ok){return{error:data.error||"Erreur "+r.status};}
    return data;
  }catch(e){return{error:e.message};}
}

async function fetchRealBalance(){
  const data=await exchangeAPI("balance");
  if(data.error){
    if(data.local)return; // Silent fail if not on Netlify
    WALLET.error=data.error;D();return;
  }
  // Parse balance based on exchange
  if(WALLET.exchange==="binance"&&data.balances){
    const eur=data.balances.find(b=>b.asset==="EUR");
    const usdt=data.balances.find(b=>b.asset==="USDT");
    const btc=data.balances.find(b=>b.asset==="BTC");
    WALLET.realBalance={
      eur:eur?parseFloat(eur.free):0,
      usdt:usdt?parseFloat(usdt.free):0,
      btc:btc?parseFloat(btc.free):0,
      assets:data.balances.filter(b=>parseFloat(b.free)>0||parseFloat(b.locked)>0).map(b=>({asset:b.asset,free:parseFloat(b.free),locked:parseFloat(b.locked)}))
    };
    WALLET.lastSync=Date.now();lg("SYS","💰 Solde réel synchronisé");
  }
  D();
}

async function realBuy(symbol,amountEur){
  if(!WALLET.connected)return{error:"Wallet non connecté"};
  const confirm_msg=confirm("🔒 CONFIRMER L'ACHAT\n\n"+symbol+" pour "+amountEur+"€\n\nCet ordre sera exécuté sur "+((EXCHANGES.find(e=>e.id===WALLET.exchange)||{}).n||"")+". Continue?");
  if(!confirm_msg)return{error:"Annulé"};
  const data=await exchangeAPI("buy",{symbol,type:"MARKET",quoteOrderQty:String(amountEur)});
  if(data.error){lg("SYS","❌ Achat échoué: "+data.error);return data;}
  lg("BUY","✅ ACHAT RÉEL "+symbol+" "+amountEur+"€ exécuté");
  await fetchRealBalance();
  return data;
}

async function realSell(symbol,quantity){
  if(!WALLET.connected)return{error:"Wallet non connecté"};
  const confirm_msg=confirm("🔒 CONFIRMER LA VENTE\n\n"+quantity+" "+symbol+"\n\nCet ordre sera exécuté RÉELLEMENT. Continue?");
  if(!confirm_msg)return{error:"Annulé"};
  const data=await exchangeAPI("sell",{symbol,type:"MARKET",quantity:String(quantity)});
  if(data.error){lg("SYS","❌ Vente échouée: "+data.error);return data;}
  lg("WIN","✅ VENTE RÉELLE "+symbol+" exécutée");
  await fetchRealBalance();
  return data;
}

function lg(t,m){
  // Deduplicate: if last log is similar, increment counter
  const last=S.log[S.log.length-1];
  if(last&&last.type===t){
    // Compare core message (ignore numbers that change slightly)
    const core=m=>m.replace(/[0-9.,]+/g,"#").replace(/€#/g,"€").slice(0,60);
    if(core(last.msg)===core(m)){
      last.count=(last.count||1)+1;last.t=Date.now();last.msg=m;sv();return;
    }
  }
  S.log.push({t:Date.now(),type:t,msg:m,count:1});
  if(S.log.length>60)S.log=S.log.slice(-50);sv();
}

// Candlestick patterns (from PDF ch.2 — 8 essential patterns)
function detectCandle(p){if(!p||p.length<6)return[];const patterns=[];const len=p.length;
  const c3=p[len-1],c2=p[len-2],c1=p[len-3],c0=p[len-4],prev=p[len-5],prev2=p[len-6];

// Support/Resistance (from PDF ch.3)
function findSR(p){if(!p||p.length<20)return{supports:[],resistances:[]};const cur=p[p.length-1];const sup=[],res=[];

function detectOB(p){

}
function detectBOS(p){
  if(!p||p.length<20)return{type:null};
  const len=p.length;const swH=[],swL=[];
  for(let i=5;i<len-2;i++){const seg=p.slice(i-5,i+1);if(p[i]===Math.max(...seg))swH.push({i,v:p[i]});if(p[i]===Math.min(...seg))swL.push({i,v:p[i]});}
  const cur=p[len-1],prev=p[len-2];
  const lh=swH.pop(),ll=swL.pop();
  if(lh&&cur>lh.v&&prev<=lh.v)return{type:"BULL",level:lh.v,label:"BOS ↑ Cassure haussière"};
  if(ll&&cur<ll.v&&prev>=ll.v)return{type:"BEAR",level:ll.v,label:"BOS ↓ Cassure baissière"};

}
function detectFVG(p){

    const c1h=Math.max(p[i-2],p[i-1]),c1l=Math.min(p[i-2],p[i-1]);

  // Bollinger bands — very faint

  // Volume bars — bottom, subtle

    const c2=zData[i]-zData[i-1];const bH=Math.min(vH,Math.abs(c2/rng)*ch*.2+1);const bW=Math.max(2,cw/zData.length*vStep*.6);
    vol+=`<rect x="${X(i)-bW/2}" y="${h-pad.b-bH}" width="${bW}" height="${bH}" fill="${c2>=0?"#10b981":"#ef4444"}" opacity=".08" rx="1"/>`;}

  // Stats bar
  // X-axis time labels
  let xLabels="";
  if(chartTimes&&chartTimes.length>=zLen){
    const zTimes=chartTimes.slice(start,start+zLen);
    const labelCount=Math.min(Math.max(4,Math.floor(cw/100)),8);

      const idx=Math.floor(i*(zData.length-1)/(labelCount-1));
      const ts=zTimes[idx];if(!ts)continue;
      const d=new Date(ts);const x=X(idx);
      let lbl="";
      if(selTF==="1d"||zData.length<100)lbl=d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0");

      else lbl=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"][d.getMonth()]+" "+d.getFullYear();
      xLabels+=`<text x="${x}" y="${h-4}" text-anchor="middle" fill="#475569" font-size="7" font-family="DM Mono,monospace">${lbl}</text>`;
      xLabels+=`<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${h-pad.b}" stroke="#1e293b" stroke-width=".3" stroke-dasharray="2"/>`;
    }

  </div>`;

  const legend=`<div style="display:flex;justify-content:space-between;font-size:9px;padding:0 6px;color:var(--t3)"><span>SMA7<span style="color:var(--cy)">━</span> SMA25<span style="color:var(--pr)">━</span> Boll<span style="color:var(--gd)">╌</span></span><span>Zoom: x${Math.round(chartZoom*10)/10} • ${zData.length} points</span></div>`;

    ${grid}${xLabels}${srLines}${smcLines}

}

// Touch pinch zoom + mouse wheel zoom + drag pan
let lastPinchDist=0;let isDragging=false;let dragStartX=0;let dragStartOffset=0;
let chartZoomInited=false;
let _mouseMoveHandler=null;let _mouseUpHandler=null;
function initChartZoom(){
  const box=$("chartSvgBox");if(!box)return;
  // Remove old document listeners
  if(_mouseMoveHandler)document.removeEventListener("mousemove",_mouseMoveHandler);
  if(_mouseUpHandler)document.removeEventListener("mouseup",_mouseUpHandler);
  // Mouse wheel zoom (PC)
  box.addEventListener("wheel",e=>{
    e.preventDefault();
    if(e.deltaY<0)chartZoom=Math.min(6,chartZoom*1.1);
    else chartZoom=Math.max(1,chartZoom/1.1);
    if(chartZoom<=1.05)chartOffset=0;
    updChart();
  },{passive:false});

  // Mouse drag pan (PC)
  box.addEventListener("mousedown",e=>{isDragging=true;dragStartX=e.clientX;dragStartOffset=chartOffset;box.style.cursor="grabbing";});
  _mouseMoveHandler=e=>{
    if(!isDragging||!chartData)return;
    const dx=e.clientX-dragStartX;
    const ptsPerPx=chartData.length/(box.offsetWidth||300)/chartZoom;
    chartOffset=Math.max(0,Math.min(chartData.length-10,Math.round(dragStartOffset+dx*ptsPerPx)));
    updChart();
  };
  _mouseUpHandler=()=>{isDragging=false;};
  document.addEventListener("mousemove",_mouseMoveHandler);
  document.addEventListener("mouseup",_mouseUpHandler);

  // Touch pinch zoom (mobile)
  let touchStartX=0;let touchStartOff=0;
  box.addEventListener("touchstart",e=>{
    if(e.touches.length===2){
      lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    }else if(e.touches.length===1){
      touchStartX=e.touches[0].clientX;touchStartOff=chartOffset;
    }
  },{passive:true});
  box.addEventListener("touchmove",e=>{
    if(e.touches.length===2){
      e.preventDefault();
      const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      if(lastPinchDist>0){
        const scale=dist/lastPinchDist;
        if(scale>1.03)chartZoom=Math.min(20,chartZoom*1.08);
        else if(scale<0.97)chartZoom=Math.max(1,chartZoom/1.08);
        if(chartZoom<=1.05)chartOffset=0;
        updChart();
      }
      lastPinchDist=dist;
    }else if(e.touches.length===1&&chartData){
      // Single finger drag = pan
      const dx=e.touches[0].clientX-touchStartX;
      const ptsPerPx=chartData.length/(box.offsetWidth||300)/chartZoom;
      chartOffset=Math.max(0,Math.min(chartData.length-10,Math.round(touchStartOff+dx*ptsPerPx)));
      updChart();
    }
  },{passive:false});
  box.addEventListener("touchend",()=>{lastPinchDist=0;},{passive:true});
  box.style.cursor="grab";
}

function checkStops(){const tc=[];S.pos=S.pos.filter(p=>{const c=S.coins.find(x=>x.id===p.cid);if(!c)return true;
  const curPrice=lp(c);const pp=posPnL(p,c);
  
  // Track peak P&L (for trailing stop)
  if(!p.peakPnL||pp>p.peakPnL)p.peakPnL=pp;
  
  // TRAILING STOP: if P&L was >3% but dropped >2% from peak → sell
  if(p.peakPnL>3&&(p.peakPnL-pp)>2){
    tc.push({...p,exit:curPrice,pnlP:pp,sellReason:"TRAILING-STOP",whySell:["📈 Pic P&L: +"+fP(p.peakPnL)+" → retombé à "+fP(pp),"🛡️ Trailing stop: gains protégés"]});return false;
  }
  // CLASSIC STOP-LOSS
  if(pp<=p.sl*(p.lv||1)){
    tc.push({...p,exit:curPrice,pnlP:pp,sellReason:"STOP-LOSS",whySell:["🛑 P&L "+fP(pp)+" → stop-loss touché","Protection du capital"]});return false;
  }
  // TAKE-PROFIT
  if(pp>=p.tp*(p.lv||1)){
    tc.push({...p,exit:curPrice,pnlP:pp,sellReason:"TAKE-PROFIT",whySell:["🎯 Objectif +"+fP(pp)+" atteint!","Profit sécurisé"]});return false;
  }
  // SMART EXIT: LONG in profit + RSI>75 → sell. SHORT in profit + RSI<25 → cover.
  const ta=analyze(c);
  if(p.type!=="SHORT"&&pp>5&&ta.rsi&&ta.rsi>75){
    tc.push({...p,exit:curPrice,pnlP:pp,sellReason:"SMART-EXIT",whySell:["🧠 LONG +"+fP(pp)+" & RSI "+Math.round(ta.rsi)+" suracheté","Sortie avant correction"]});return false;
  }
  if(p.type==="SHORT"&&pp>5&&ta.rsi&&ta.rsi<25){
    tc.push({...p,exit:curPrice,pnlP:pp,sellReason:"SMART-EXIT",whySell:["🧠 SHORT +"+fP(pp)+" & RSI "+Math.round(ta.rsi)+" survendu","Couverture avant rebond"]});return false;
  }
  return true;});
tc.forEach(t=>{const pnl=t.inv*(t.pnlP/100);S.cash+=Math.max(0,t.inv+pnl);S.cl.push({...t,pnl,at:new Date().toISOString()});lg(pnl>=0?"WIN":"LOSS",`${pnl>=0?"🎯":"🛑"} ${t.sellReason} ${t.name} x${t.lv||1}: ${fEp(pnl)}`);notify(pnl>=0?"🎯 "+t.name:"🛑 "+t.name,fEp(pnl));if(pnl>=0){B.w++;B.str++;B.ms=Math.max(B.ms,B.str);B.sc=Math.min(100,B.sc+1.5);}else{B.l++;B.str=0;B.sc=Math.max(0,B.sc-2);B.les.push({t:Date.now(),coin:t.name,loss:pnl,reason:t.whySell?.join(" | ")||"",cond:t.cond||{},err:t.sellReason});}B.pnl+=pnl;});if(tc.length){sv();D();}}

// ═══ AUTO-MODE — L'IA choisit le mode optimal ═══
function autoSelectMode(){
  if(!S.coins.length)return tradingMode==="real"?"realSafe":"normal";
  var redCount=S.coins.filter(function(c){return (c.price_change_percentage_24h||0)<0;}).length;
  var redPct=redCount/S.coins.length*100;
  var btc=S.coins.find(function(c){return c.id==="bitcoin";});
  var btcChg=btc?Math.abs(btc.price_change_percentage_24h||0):0;
  var avgVol=S.coins.reduce(function(s,c){return s+Math.abs(c.price_change_percentage_24h||0);},0)/S.coins.length;
  
  // If real money connected — be extra cautious
  if(WALLET.connected){
    if(redPct>55||btcChg>5)return "realSafe"; // Marché instable → ultra prudent
    if(avgVol<2&&redPct<40)return "realNormal"; // Marché calme et vert → normal
    return "realSafe"; // Par défaut: prudent
  }
  
  // Simulation mode — can be more aggressive
  if(redPct>60||btcChg>6)return "normal"; // Marché dangereux → normal
  if(avgVol<1.5&&redPct<30&&B.sc>70)return "extreme"; // Calme + bon score → extrême
  if(avgVol<3&&redPct<45)return "fast"; // Moyen → rapide
  return "normal";
}

// ═══ FRAUD & RISK DETECTION ═══
function riskScan(c){
  const warnings=[];let riskLevel="FAIBLE";let score=0;
  const mc=c.market_cap||0;const vol=c.total_volume||0;const chg=Math.abs(c.price_change_percentage_24h||0);
  const rank=c.market_cap_rank||9999;
  // Market cap too low = very risky
  if(mc<1000000){warnings.push("⛔ Capitalisation <1M€ — très risqué, liquidité quasi nulle");score+=30;}
  else if(mc<10000000){warnings.push("⚠️ Capitalisation <10M€ — projet peu établi");score+=15;}
  else if(mc<100000000){warnings.push("🟡 Capitalisation <100M€ — projet en développement");score+=5;}
  // Volume too low = can't sell
  if(vol<100000){warnings.push("⛔ Volume <100K€/jour — impossible de vendre rapidement");score+=25;}
  else if(vol<1000000){warnings.push("⚠️ Volume <1M€/jour — liquidité faible");score+=10;}
  // Extreme price swings = pump & dump
  if(chg>30){warnings.push("🚨 Variation 24h >30% — possible pump & dump");score+=20;}
  else if(chg>15){warnings.push("⚠️ Variation 24h >15% — très volatile");score+=8;}
  // Rank too low
  if(rank>500){warnings.push("⚠️ Rang >500 — projet marginal, risque élevé");score+=10;}
  if(rank>1000){warnings.push("⛔ Rang >1000 — crypto quasi inconnue, extrêmement risquée");score+=15;}
  // Volume/Mcap ratio suspicious
  if(mc>0&&vol/mc>1){warnings.push("🚨 Volume > capitalisation — activité suspecte, possible manipulation");score+=20;}
  if(mc>0&&vol/mc<0.01){warnings.push("⚠️ Volume très faible par rapport à la cap — marché mort");score+=10;}
  // ATH drop extreme
  if(c.ath_change_percentage&&c.ath_change_percentage<-95){warnings.push("⛔ -95% depuis l'ATH — projet probablement mort");score+=20;}
  else if(c.ath_change_percentage&&c.ath_change_percentage<-90){warnings.push("🚨 -90% depuis l'ATH — en chute libre");score+=10;}
  // Risk level
  if(score>=40)riskLevel="CRITIQUE";
  else if(score>=25)riskLevel="ÉLEVÉ";
  else if(score>=10)riskLevel="MOYEN";
  else riskLevel="FAIBLE";
  return{riskLevel,score,warnings,safe:score<25};
}


const GUARDIAN={
  active:true,
  lastCheck:0,
  alerts:[],
  // Circuit breaker — like stock exchanges
  circuitBreaker:{triggered:false,reason:"",at:0,cooldown:300000}, // 5min cooldown
  
  // Check all danger conditions
  check(coins,pos){
    if(!this.active||!coins.length)return{safe:true,alerts:[]};
    const now=Date.now();const alerts=[];let emergency=false;
    
    // 1. FLASH CRASH detection — any coin drops >8% in data we have
    coins.forEach(c=>{
      const sp=c.sparkline_in_7d?.price||[];
      if(sp.length>10){
        const recent=sp.slice(-10);
        const maxP=Math.max(...recent),minP=Math.min(...recent);
        const drop=((minP-maxP)/maxP)*100;
        if(drop<-8){alerts.push({level:"CRITICAL",msg:`🚨 FLASH CRASH ${c.name}: ${(drop||0).toFixed(1)}% en quelques heures`,coin:c.id});emergency=true;}
      }
      // Extreme 24h move
      if(Math.abs(c.price_change_percentage_24h||0)>15){
        alerts.push({level:"WARNING",msg:`⚠️ ${c.name} mouvement extrême 24h: ${(c.price_change_percentage_24h||0).toFixed(1)}%`,coin:c.id});
      }
    });
    
    // 2. MARKET CRASH — majority of coins down heavily
    const downCoins=coins.filter(c=>(c.price_change_percentage_24h||0)<-5).length;
    const crashPct=downCoins/coins.length*100;
    if(crashPct>60){alerts.push({level:"CRITICAL",msg:`🚨 CRASH MARCHÉ: ${Math.round(crashPct)}% des cryptos en chute >5%`});emergency=true;}
    else if(crashPct>40){alerts.push({level:"WARNING",msg:`⚠️ Marché faible: ${Math.round(crashPct)}% des cryptos en baisse >5%`});}
    
    // 3. PORTFOLIO PROTECTION — total P&L check
    if(pos.length){
      const totalPnL=pos.reduce((s,p)=>{
        const c=coins.find(x=>x.id===p.cid);if(!c)return s;
        return s+(p.inv*(posPnL(p,c)/100));
      },0);
      const totalInv=pos.reduce((s,p)=>s+p.inv,0);
      const pctLoss=totalInv>0?totalPnL/totalInv*100:0;
      
      // Emergency: losing more than 10% of invested capital
      if(pctLoss<-10){alerts.push({level:"CRITICAL",msg:`🚨 PERTE PORTFOLIO: ${(pctLoss||0).toFixed(1)}% — coupure d'urgence recommandée`});emergency=true;}
      // Warning: losing more than 5%
      else if(pctLoss<-5){alerts.push({level:"WARNING",msg:`⚠️ Portfolio en perte: ${(pctLoss||0).toFixed(1)}%`});}
    }
    
    // 4. VOLATILITY SPIKE — sudden increase in volatility
    const avgVol=coins.reduce((s,c)=>s+Math.abs(c.price_change_percentage_24h||0),0)/coins.length;
    if(avgVol>8){alerts.push({level:"WARNING",msg:`⚠️ Volatilité marché EXTRÊME: ${avgVol.toFixed(1)}% moyenne`});if(avgVol>12)emergency=true;}
    
    // 5. PRICE ANOMALY — detect if a price seems wrong (>50% from ATH in 24h = suspicious)
    coins.forEach(c=>{
      if(c.price_change_percentage_24h&&Math.abs(c.price_change_percentage_24h)>40){
        alerts.push({level:"CRITICAL",msg:`🚨 ANOMALIE ${c.name}: ${c.price_change_percentage_24h.toFixed(1)}% en 24h — données suspectes`,coin:c.id});
      }
    });
    
    // 6. CORRELATION BREAK — if BTC crashes but alts pump = suspicious
    const btc=coins.find(c=>c.id==="bitcoin");
    if(btc){
      const btcChg=btc.price_change_percentage_24h||0;
      const altAvg=coins.filter(c=>c.id!=="bitcoin"&&c.id!=="ethereum").reduce((s,c)=>s+(c.price_change_percentage_24h||0),0)/(coins.length-2||1);
      if(btcChg<-5&&altAvg>5){alerts.push({level:"WARNING",msg:`⚠️ Décorrélation: BTC ${btcChg.toFixed(1)}% mais alts +${altAvg.toFixed(1)}% — situation inhabituelle`});}
    }
    
    // Circuit breaker
    if(emergency&&!this.circuitBreaker.triggered){
      this.circuitBreaker.triggered=true;memRecord("CIRCUIT_BREAKER",{reason:alerts.find(function(a){return a.level==="CRITICAL";})?.msg||"Urgence"});
      this.circuitBreaker.at=now;
      this.circuitBreaker.reason=alerts.find(a=>a.level==="CRITICAL")?.msg||"Urgence";
    }
    // Auto-reset after cooldown
    if(this.circuitBreaker.triggered&&now-this.circuitBreaker.at>this.circuitBreaker.cooldown){
      this.circuitBreaker.triggered=false;
    }
    
    this.alerts=alerts;this.lastCheck=now;
    return{safe:!emergency,alerts,circuitBreaker:this.circuitBreaker.triggered};
  },
  
  // Emergency sell all positions
  emergencySellAll(reason){
    if(!S.pos.length)return;
    lg("SYS","🚨 COUPURE D'URGENCE: "+reason);
    const toSell=[...S.pos];
    S.pos=[];
    toSell.forEach(p=>{
      const c=S.coins.find(x=>x.id===p.cid);
      const cur=c?lp(c):p.entry;
      const pp=posPnL(p,c);
      const pnl=p.inv*(pp/100);
      S.cash+=Math.max(0,p.inv+pnl);
      S.cl.push({...p,exit:cur,pnl,pnlP:pp,sellReason:"URGENCE",at:new Date().toISOString()});
      if(pnl>=0){B.w++;B.pnl+=pnl;}else{B.l++;B.pnl+=pnl;B.les.push({t:Date.now(),coin:p.name,loss:pnl,reason:"COUPURE URGENCE: "+reason});}
      lg("LOSS",`🚨 URGENCE ${p.name}: ${fEp(pnl)} — ${reason}`);
    });
    S.auto=false;[autoT,fetchT].forEach(t=>clearInterval(t));autoT=fetchT=null;
    sv();D();
    notify("🚨 COUPURE D'URGENCE","Toutes les positions fermées — "+reason);
  },
  
  // Validate data integrity
  validateData(coins){
    if(!coins||!Array.isArray(coins)||!coins.length)return false;
    for(const c of coins.slice(0,5)){
      if(!c.current_price||c.current_price<=0)return false;
      if(!c.market_cap||c.market_cap<=0)return false;
    }
    return true;
  },

  // AUTO-PROTECT: sell dangerous positions + auto-find new opportunities
  autoProtect(){
    if(!S.autoGuardian||!S.auto||!S.coins.length)return;
    const M=MODES[S.mode]||MODES.normal;
    const sold=[];
    
    // Check each position for danger
    S.pos=S.pos.filter(p=>{
      const c=S.coins.find(x=>x.id===p.cid);if(!c)return true;
      const cur=lp(c);const pp=posPnL(p,c);
      const ta=analyze(c);
      let danger=false,reason="";
      
      // Danger: RSI extreme reversal while in profit → take profit NOW
      if(pp>2&&ta.rsi&&ta.rsi>78){danger=true;reason="RSI "+Math.round(ta.rsi)+" suracheté — prise de profit avant correction";}
      // Danger: BOS against our position
      if(p.type==="LONG"&&ta.bos?.type==="BEAR"&&pp>0){danger=true;reason="BOS baissier — structure cassée, profit sécurisé";}
      if(p.type==="SHORT"&&ta.bos?.type==="BULL"&&pp>0){danger=true;reason="BOS haussier — structure cassée, profit sécurisé";}
      // Danger: trend reversal while in position
      if(p.type==="LONG"&&ta.trend.d==="BAISSIER"&&ta.macd<0&&pp<-2){danger=true;reason="Tendance baissière + MACD négatif — coupe les pertes";}
      if(p.type==="SHORT"&&ta.trend.d==="HAUSSIER"&&ta.macd>0&&pp<-2){danger=true;reason="Tendance haussière + MACD positif — coupe les pertes";}
      // Danger: this specific coin is crashing
      if((c.price_change_percentage_24h||0)<-10){danger=true;reason=c.name+" en chute libre: "+fP(c.price_change_percentage_24h);}
      // Danger: divergence against position
      if(p.type==="LONG"&&ta.div==="BEAR"&&pp>1){danger=true;reason="Divergence baissière — sécurise le gain de "+fP(pp);}
      
      if(danger){
        const pnl=p.inv*(pp/100);
        S.cash+=Math.max(0,p.inv+pnl);
        S.cl.push({...p,exit:cur,pnl,pnlP:pp,sellReason:"AUTO-PROTECT",at:new Date().toISOString(),whySell:[reason]});
        if(pnl>=0){B.w++;B.sc=Math.min(100,B.sc+2);memPattern(p.cid||p.name,pnl,{rsi:ta.rsi?Math.round(ta.rsi):0,trend:ta.trend.d});}else{B.l++;B.sc=Math.max(0,B.sc-1);B.les.push({t:Date.now(),coin:p.name,loss:pnl,reason,cond:{rsi:ta.rsi?Math.round(ta.rsi):0,trend:ta.trend.d,score:ta.score}});}save();
        B.pnl+=pnl;
        lg(pnl>=0?"WIN":"LOSS",`🛡️ AUTO-PROTECT ${p.type} ${p.name}: ${fEp(pnl)} — ${reason}`);
        notify("🛡️ "+p.name,reason);
        sold.push(p);
        return false;
      }
      return true;
    });
    
    // AUTO-REBALANCE: search for new best opportunity after selling
    if(sold.length&&S.pos.length<M.mp){
      const ranked=S.coins.map(c=>{
        const a=analyze(c);const gc=greenCheck(a,c);
        const blocked=S.pos.find(p=>p.cid===c.id)||sold.find(p=>p.cid===c.id);
        const lessonBlocked=B.les.find(l=>l.coin===c.name&&Date.now()-l.t<600000);
        const rsk=riskScan(c);
        let adj=a.score;
        if(gc.passed>=8)adj+=5;if(a.rsi&&a.rsi<35)adj+=8;if(a.rsi&&a.rsi>65)adj-=5;
        if(a.bos?.type==="BULL")adj+=10;if(a.ob?.bull)adj+=5;
        return{coin:c,...a,gc,adj,blocked:!!blocked||!!lessonBlocked||!rsk.safe};
      }).filter(r=>!r.blocked).sort((a,b)=>b.adj-a.adj);
      
      const best=ranked[0];
      if(best&&best.adj>=M.ms&&best.gc.passed>=8){
        // Determine LONG or SHORT
        const isShort=best.rsi&&best.rsi>75&&best.trend.d==="BAISSIER"&&best.macd<0;
        const posType=isShort?"SHORT":"LONG";
        const cashReserve=INIT*0.30;
        const maxSpend=S.cash-cashReserve;
        if(maxSpend>=25){
          const confidence=(best.adj-M.ms)/(100-M.ms);
          const amt=Math.round(Math.min(maxSpend*M.sz*confidence/100,maxSpend*0.5));
          if(amt>=25){
            const ep=lp(best.coin);const lev=CFG.customLev||M.lv;const fee=amt*CFG.fees/100;
            S.cash-=amt;
            S.pos.push({id:uid(),cid:best.coin.id,name:best.coin.name,entry:ep,qty:(amt-fee)/ep,inv:amt,fee,lv:lev,sl:M.sl,tp:M.tp,score:best.adj,sig:best.signal,mode:S.mode,img:best.coin.image,entryT:Date.now(),type:posType,peakPrice:ep,
              whyBuy:[posType+" — Score "+best.adj+"/100, "+best.gc.passed+"/"+best.gc.total+" critères"],
              cond:{rsi:best.rsi?Math.round(best.rsi):50,trend:best.trend.d,score:best.adj}});
            memRecord("BUY",{coin:best.coin.name,score:best.adj,trend:best.trend.d});lg("BUY",`🔄 AUTO-REBALANCE → ${posType} ${best.coin.name} ${fE(amt)} x${lev} @ €${f2(ep)} | Score:${best.adj} ${best.trend.d}`);
            notify("🔄 "+posType+" "+best.coin.name,"Auto-rebalance après protection");
          }
        }
      }
    }
    if(sold.length){sv();D();}
  }
};

    adj=Math.max(0,Math.min(100,adj));

  if(B.cyc<=5){if(B.cyc===1)lg("ANALYSIS","🔍 Phase d'analyse — observation du marché pendant 5 cycles avant tout trade");return sv(),D();}
  
  // RULE 2: Keep 30% cash reserve minimum
  const cashReserve=INIT*0.30;

  if(redPct>65){if(B.cyc%30===0)lg("ANALYSIS","🛑 Marché instable ("+Math.round(redPct)+"% en rouge) — aucun achat");sv();D();return;}
  // Log market state every 10 cycles so user sees activity
  if(B.cyc%10===0&&B.cyc>5){

  for(const r of ranked){

    if(S.pos.find(p=>p.cid===r.coin.id))continue;
    
    // RULE 5: Minimum 8/15 criteria
    var minCriteria=tradingMode==="real"?8:6;if(r.gc.passed<minCriteria){continue;}
    // RULE 5b: REAL MONEY — extra checks

      if(r.gc.passed<9)continue;
      if(r.score<78)continue;
      if(r.coin.price_change_percentage_24h>30)continue;
      if(r.coin.price_change_percentage_24h<-20)continue;
      var rs=riskScan(r.coin);if(rs.riskLevel==="CRITIQUE"||rs.riskLevel==="ÉLEVÉ")continue;
    }
    // RULE 6: Risk scan — NEVER buy critically risky coins
    const rsk=riskScan(r.coin);
    if(!rsk.safe){if(B.cyc%60===0)lg("ANALYSIS",`🚨 ${r.coin.name} risque ${rsk.riskLevel} — bloqué`);continue;}
    
    // RULE 6: RSI must be favorable (not overbought)
    if(r.rsi&&r.rsi>60)continue;
    
    // RULE 7: Trend must be HAUSSIER (never buy against the trend - PDF ch.17)
    if(r.trend.d!=="HAUSSIER")continue;
    
    // RULE 8: MACD must be positive (momentum buyer side)
    if(r.macd<=0)continue;
    
    // RULE 9: Multi-timeframe must be aligned (≥1)
    if(r.mtf<1)continue;
    
    // RULE 10: 24h change must be positive
    if((r.coin.price_change_percentage_24h||0)<=0)continue;
    
    // RULE 11: Not too volatile (>12% = skip)
    if(r.tooVolatile||r.vol24>12)continue;
    
    // RULE 12: Pattern learning — block similar losing conditions for 10 min
    const cond={rsi:r.rsi?Math.round(r.rsi):50,trend:r.trend.d,macd:r.macd>0,score:r.adj,criteria:r.gc.passed};
    const blocked=B.les.find(l=>{

      return Date.now()-l.t<600000&&Math.abs((l.cond.rsi||50)-cond.rsi)<12&&l.cond.trend===cond.trend&&Math.abs((l.cond.score||50)-cond.score)<10;
    });
    if(blocked){if(B.cyc%20===0)lg("ANALYSIS",`⏭️ ${r.coin.name} bloqué — pattern de perte similaire`);continue;}
    
    // RULE 13: Keep cash reserve

    const confidence=(r.adj-M.ms)/(100-M.ms); // 0 to 1

    lg("BUY",`🟢 ${posType} ${r.coin.name} — ${fE(amt)} x${lev} @ €${f2(ep)} | RSI:${r.rsi?Math.round(r.rsi):"?"} ${r.trend.d} MACD:${r.macd>0?"↑":"↓"} | ${r.gc.passed}/${r.gc.total} critères | ${why[0]}`);
    notify("🟢 "+posType+" "+r.coin.name,fE(amt)+" x"+lev+" — "+r.trend.d);
  }

  // ═══ SELL — with learning ═══
  for(const p of [...S.pos]){
    const c=S.coins.find(x=>x.id===p.cid);if(!c)continue;
    const ta=analyze(c);const cur=lp(c);const pp=posPnL(p,c);
    let sr=null,ws=[];
    if(pp<=p.sl*(p.lv||1)){sr="STOP-LOSS";ws=["Stop-loss: "+fP(pp),"Prix chuté au-delà du seuil de risque"];}
    else if(pp>=p.tp*(p.lv||1)){sr="TAKE-PROFIT";ws=["Objectif atteint: "+fP(pp),"Profit sécurisé"];}
    else if(ta.score<=(MODES[p.mode]||M).ss){sr="SCORE";ws=["Score: "+p.score+"→"+ta.score];
      if(ta.rsi>70)ws.push("RSI "+Math.round(ta.rsi)+" suracheté");
      if(ta.trend.d==="BAISSIER")ws.push("Tendance retournée");
      ws.push(pp>=0?"Gain pris":"Perte coupée");}
    else if(pp>(MODES[p.mode]||M).pe*(p.lv||1)*.5&&ta.score<52){sr="SÉCURISATION";ws=["Profit "+fP(pp)+" + score faible ("+ta.score+")"];}
    if(sr){
      const pnlRaw=p.inv*(pp/100);const sellFee=Math.max(0,p.inv+pnlRaw)*CFG.fees/100;const pnl=pnlRaw-sellFee-(p.fee||0);
      S.cash+=Math.max(0,p.inv+pnl);S.pos=S.pos.filter(x=>x.id!==p.id);
      const econd={rsi:ta.rsi?Math.round(ta.rsi):50,trend:ta.trend.d,score:ta.score};
      S.cl.push({...p,exit:cur,pnl,pnlP:pp,sellReason:sr,whySell:ws,econd,at:new Date().toISOString()});
      lg(pnl>=0?"WIN":"LOSS",`${pnl>=0?"✅ Gain":"❌ Perte"} ${p.name} x${p.lv||1}: ${fEp(pnl)} — ${ws[0]}`);
      notify(pnl>=0?"✅ "+p.name:"❌ "+p.name,fEp(pnl));
      if(pnl>=0){B.w++;B.str++;B.ms=Math.max(B.ms,B.str);B.sc=Math.min(100,B.sc+1);}
      else{
        B.l++;B.str=0;B.sc=Math.max(0,B.sc-1.5);
        // ═══ LEARN FROM FAILURE ═══
        const err=sr==="STOP-LOSS"?
          `Prix chuté ${fP(Math.abs(pp))}. RSI était ${p.cond?.rsi||"?"}, tendance ${p.cond?.trend||"?"}. ${p.cond?.trend!==econd.trend?"Tendance RETOURNÉE":"Tendance n'a pas tenu"}.`:
          `Score ${p.score}→${ta.score}. Indicateurs détériorés.`;
        const prev=`Bloquer ${p.name} quand RSI≈${p.cond?.rsi||"?"} + ${p.cond?.trend||"?"} + score≈${p.cond?.score||"?"} pendant 10min`;
        B.les.push({t:Date.now(),coin:p.name,loss:pnl,reason:ws.join(" | "),cond:p.cond||{},econd,err,prev});
        if(B.les.length>30)B.les=B.les.slice(-25);
        lg("ANALYSIS",`📚 ${err}`);
        lg("ANALYSIS",`🛡️ ${prev}`);
      }
      B.pnl+=pnl;
    }
  }
  sv();D();
  }catch(e){console.warn("Trade:",e);}
}

    <div class="row"><span style="color:var(--t3)">Frais exchange (%)</span><div style="display:flex;gap:4px;align-items:center"><input id="cfgFee" type="number" class="input" value="${CFG.fees}" step="0.01" style="width:60px;padding:6px;font-size:12px;text-align:right"><button class="btn btn-ghost" onclick="CFG.fees=parseFloat($('cfgFee')?.value)||0.1;saveCfg();D();" style="padding:6px 10px;font-size:10px">OK</button></div></div>
    <div style="font-size:10px;color:var(--t3);margin-top:6px">Les frais se mettent à jour auto quand tu choisis un exchange ci-dessous.</div>
    </div>

    <div class="card"><div class="h2">🏦 Connexion Exchange</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:8px">${EXCHANGES.length} plateformes • Clique pour dérouler${CFG.exchange?" • <b style='color:var(--cy)'>"+((EXCHANGES.find(e=>e.id===CFG.exchange)||{}).n||"")+"</b> sélectionné":""}</div>
    <input class="input" placeholder="🔍 Rechercher un exchange..." oninput="exSearchQ=this.value;D();" value="${exSearchQ}" id="exSearch" style="margin-bottom:8px;font-size:12px">
    ${["Crypto","Bourse"].map(cat=>{
      const exKey="ex_"+cat;
      const exFiltered=EXCHANGES.filter(e=>e.cat===cat&&(!exSearchQ||e.n.toLowerCase().includes(exSearchQ.toLowerCase())));
      return`<div style="margin-bottom:6px">
        <button class="btn btn-ghost" onclick="togSec('${exKey}');D();" style="width:100%;text-align:left;padding:10px 14px;font-size:13px;display:flex;justify-content:space-between;align-items:center">
          <span>${cat==="Crypto"?"₿ Exchanges Crypto":"📊 Courtiers Bourse"} (${exFiltered.length})</span><span class="arr">${openSections[exKey]?"▾":"▸"}</span>
        </button>
        <div style="display:${openSections[exKey]?"block":"none"};padding-top:6px">
        ${exFiltered.map(ex=>{const sel=CFG.exchange===ex.id;
          return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid var(--bd);${sel?"background:rgba(34,211,238,.04)":""}">
            <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
              <span style="font-size:16px;flex-shrink:0">${ex.logo}</span>
              <div style="min-width:0"><b style="font-size:12px">${ex.n}</b>
              <div style="font-size:9px;color:var(--t3)">${ex.fees.maker}/${ex.fees.taker}% • x${ex.lev} • ${ex.min}€ min</div></div>
            </div>
            <button class="btn ${sel?"btn-gn":"btn-ghost"}" onclick="CFG.exchange=${sel?"null":"'"+ex.id+"'"};CFG.fees=${ex.fees.taker};saveCfg();D();" style="padding:4px 10px;font-size:10px;flex-shrink:0">${sel?"✓":"Choisir"}</button>
          </div>`;}).join("")}
        </div>
      </div>`;}).join("")}
    </div>

    <div class="card"><div class="h2">💰 Ajouter des fonds</div>
    <div style="display:flex;gap:6px;margin-bottom:8px"><input id="afi" type="number" class="input" placeholder="Montant €" style="flex:1"><button class="btn btn-gd" onclick="const v=parseFloat($('afi')?.value);if(v>0){S.cash+=v;lg('SYS','💰 +'+fE(v));$('afi').value='';sv();D();}">+ Ajouter</button></div>
    <div class="card"><div class="h2">🔧 Debug</div>
    <div id="debugInfo" style="font-size:10px;color:var(--t2);font-family:monospace;line-height:1.8;background:var(--s1);padding:10px;border-radius:6px;max-height:200px;overflow-y:auto">
      Cryptos : ${S.coins.length} chargées<br>
      WebSocket : ${wsConnected?"🟢 EN DIRECT":"🔴 ARRÊTÉ"}<br>
      Proxy : ${bestProxy>=0?"#"+bestProxy:"aucun"}<br>
      Échecs réseau : ${fetchFails}<br>
      Erreurs données : ${fetchErrors}<br>
      Onglet : ${S.tab}<br>
      Auto : ${S.auto?"ACTIF":"ARRÊTÉ"}<br>
      Mode : ${S.mode}<br>
      Capital : ${S.cash}€<br>
      Positions : ${S.pos.length}<br>
      Cycles : ${B.cyc}<br>
      Dernière MAJ : ${S.lu?new Date(S.lu).toLocaleTimeString("fr"):"jamais"}<br>
      Portefeuille : ${WALLET.connected?"🟢":"🔴"}<br>
      Erreurs JS : <span id="jsErrors">0</span>
    </div>
    <div style="display:flex;gap:6px;margin-top:6px"><button class="btn btn-cy" onclick="fetchAll().then(()=>D())" style="flex:1;font-size:11px">🔄 Recharger</button><button class="btn btn-ghost" onclick="var t=document.getElementById('debugInfo').innerText;try{var ta=document.createElement('textarea');ta.value=t;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Copié!');}catch(x){prompt('Copie:',t);}" style="flex:1;font-size:11px">📋 Copier debug</button></div>
    </div>

    <div class="card"><div class="h2">💾 Sauvegarde & Restauration</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:8px">Exporte tes données pour ne jamais les perdre. Importe-les sur un autre appareil ou après une mise à jour.</div>
    <div class="g2" style="margin-bottom:6px"><button class="btn btn-gn" onclick="exportData()" style="width:100%">📤 Exporter mes données</button><button class="btn btn-cy" onclick="importData()" style="width:100%">📥 Importer une sauvegarde</button></div>
    <div style="font-size:10px;color:var(--gd)">💡 Fais un export après chaque session importante. Le fichier contient : capital, positions, historique, mémoire IA, paramètres.</div></div>

    <div class="g2"><button class="btn btn-or" onclick="resetF()" style="width:100%">🔄 Reset fonds</button><button class="btn btn-rd" onclick="if(confirm('Reset cerveau?')){B={sc:50,cyc:0,les:[],w:0,l:0,pnl:0,gen:1,pk:INIT,ms:0,str:0};save();D();}" style="width:100%">🧠 Reset IA</button></div></div>

    <div class="verdict v-sell" style="font-size:11px">⚠️ Simulation fidèle au marché réel. Pas de conseil financier. Le trading comporte des risques de pertes.</div>`;
    break;
  }
}

// ═══ INIT ═══
// Init
try{D();}catch(e){try{document.getElementById("content").innerHTML="<div style=\"padding:20px;color:#fff\">Chargement...</div>";}catch(x){}}
// Check if data was lost (fresh start with no history)
if(S.cash===1000&&S.cl.length===0&&S.pos.length===0&&B.cyc>0){
  // Brain has cycles but no trades = data might be from different path
  // Reset brain too
  B.cyc=0;B.w=0;B.pnl=0;B.sc=50;
}
try{var ld=document.getElementById("loading");if(ld)ld.style.display="none";}catch(e){}
var initRetries=0;
function initFetch(){
  fetchAll().then(function(){
    if(!S.coins.length&&initRetries<10){initRetries++;setTimeout(initFetch,1500);}
    else{try{fetchFreeNews();}catch(e){} D();}
  }).catch(function(e){
    console.warn("Init:",e);
    if(initRetries<10){initRetries++;setTimeout(initFetch,1500);}
  });
}
setTimeout(initFetch,100);setInterval(fetchAll,30000);
// Refresh wallet balance every 60s if connected
setInterval(function(){try{if(WALLET.connected&&!WALLET.locked)fetchRealBalance();}catch(e){}},60000);setInterval(fetchFreeNews,180000);
window.addEventListener("beforeunload",save);
</script>
</body>
</html>
